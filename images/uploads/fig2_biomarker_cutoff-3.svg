<svg viewBox="0 36 760 434" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="36" width="760" height="434" fill="#FFFFFF"/>

  <!-- optimal band shade (purple dim) -->
  <rect x="332" y="58" width="92" height="312" fill="#A345F6" opacity="0.11"/>

  <!-- axes -->
  <line x1="95" y1="370" x2="702" y2="370" stroke="#444444" stroke-width="1.6"/>
  <polygon points="704,370 694,365 694,375" fill="#444444"/>
  <line x1="95" y1="370" x2="95" y2="46" stroke="#444444" stroke-width="1.6"/>
  <polygon points="95,44 90,54 100,54" fill="#444444"/>

  <!-- effect size rising (green dashed) -->
  <path d="M95,332 C250,322 380,150 520,112 C580,98 640,93 690,91" fill="none" stroke="#3DBA7E" stroke-width="2.2" stroke-dasharray="6 4"/>
  <text x="612" y="86" font-family="Nunito Sans, Avenir Next, Arial, sans-serif" font-size="12.5" fill="#3DBA7E" font-weight="600">effect size (rises)</text>

  <!-- population falling (ink dashed) -->
  <path d="M95,110 C250,120 380,250 520,300 C580,322 640,336 690,342" fill="none" stroke="#444444" stroke-width="2.2" stroke-dasharray="6 4"/>
  <text x="612" y="358" font-family="Nunito Sans, Avenir Next, Arial, sans-serif" font-size="12.5" fill="#444444" font-weight="600">population (falls)</text>

  <!-- overall value (purple bold inverted-U) -->
  <path d="M95,305 C190,255 305,150 378,140 C452,151 560,250 690,315" fill="none" stroke="#A345F6" stroke-width="4.2"/>
  <text x="150" y="225" font-family="Nunito Sans, Avenir Next, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#A345F6">Overall value</text>

  <!-- optimal cutoff marker -->
  <line x1="378" y1="370" x2="378" y2="140" stroke="#A345F6" stroke-width="1.8" stroke-dasharray="5 4"/>
  <circle cx="378" cy="140" r="5" fill="#A345F6"/>
  <text x="378" y="126" font-family="Nunito Sans, Avenir Next, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#A345F6" text-anchor="middle">Optimal cutoff</text>

  <!-- axis ends -->
  <text x="108" y="392" font-family="Nunito Sans, Avenir Next, Arial, sans-serif" font-size="11.5" fill="#888888">looser (all-comers)</text>
  <text x="688" y="392" font-family="Nunito Sans, Avenir Next, Arial, sans-serif" font-size="11.5" fill="#888888" text-anchor="end">stricter (enriched)</text>
  <text x="395" y="410" font-family="Nunito Sans, Avenir Next, Arial, sans-serif" font-size="13" fill="#444444" text-anchor="middle">Biomarker cutoff</text>
  <text x="40" y="210" font-family="Nunito Sans, Avenir Next, Arial, sans-serif" font-size="13" fill="#444444" text-anchor="middle" transform="rotate(-90 40 210)">Relative value</text>

  <!-- caption -->
  <text x="95" y="440" font-family="Nunito Sans, Avenir Next, Arial, sans-serif" font-size="11.5" fill="#888888" font-style="italic">Schematic. A tighter cutoff lifts effect size but shrinks the eligible population; their product peaks in the interior.</text>
</svg>
