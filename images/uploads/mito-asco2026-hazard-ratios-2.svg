<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 634" width="680" height="634" font-family="Arial, Helvetica, sans-serif">

  <rect width="680" height="634" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#0D1B2A">Hazard ratios - key ASCO 2026 trials</text>
  <text x="340" y="44" text-anchor="middle" font-size="11" fill="#5F5E5A">Lower HR = greater treatment benefit</text>

  <!-- Legend -->
  <rect x="296" y="55" width="12" height="12" fill="#1D9E75"/>
  <text x="314" y="66" font-size="11" fill="#5F5E5A">Hazard Ratio</text>

  <!-- Axes -->
  <!-- plot area x=210..650, axis at y=568 -->
  <line x1="210" y1="568" x2="650" y2="568" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="210" y1="75"  x2="210" y2="568" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Grid verticals: HR 0.2=290  0.4=370  0.6=450  0.8=530  1.0=610 -->
  <line x1="290" y1="75" x2="290" y2="568" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="370" y1="75" x2="370" y2="568" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="450" y1="75" x2="450" y2="568" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="530" y1="75" x2="530" y2="568" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="610" y1="75" x2="610" y2="568" stroke="#D3D1C7" stroke-width="1"/>

  <!-- X axis tick labels -->
  <text x="210" y="582" text-anchor="middle" font-size="10" fill="#888780">0.0</text>
  <text x="290" y="582" text-anchor="middle" font-size="10" fill="#888780">0.2</text>
  <text x="370" y="582" text-anchor="middle" font-size="10" fill="#888780">0.4</text>
  <text x="450" y="582" text-anchor="middle" font-size="10" fill="#888780">0.6</text>
  <text x="530" y="582" text-anchor="middle" font-size="10" fill="#888780">0.8</text>
  <text x="610" y="582" text-anchor="middle" font-size="10" fill="#888780">1.0</text>
  <text x="430" y="598" text-anchor="middle" font-size="11" fill="#888780">Hazard Ratio</text>

  <!-- HR 1.0 reference label -->
  <text x="610" y="71" text-anchor="middle" font-size="10" fill="#A32D2D">HR 1.0</text>

  <!-- ROW 1: LIBRETTO-432  T=82  name_y=95  bar=(210,100,69,22)  sub_y=134  val_x=285  val_y=111 -->
  <text x="200" y="95"  text-anchor="end" font-size="12" font-weight="600" fill="#444441">LIBRETTO-432</text>
  <rect x="210" y="100" width="69" height="22" rx="3" fill="#02C39A"/>
  <text x="200" y="134" text-anchor="end" font-size="10" fill="#888780">adj. NSCLC · RET+</text>
  <text x="285" y="111" dominant-baseline="central" font-size="11" font-weight="600" fill="#085041">0.17</text>

  <!-- ROW 2: CIRCULATE  T=150  name_y=163  bar=(210,168,84,22)  sub_y=202  val_x=300  val_y=179 -->
