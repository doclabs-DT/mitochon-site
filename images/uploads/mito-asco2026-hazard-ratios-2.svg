  <rect x="210" y="168" width="84" height="22" rx="3" fill="#02C39A"/>
  <text x="200" y="202" text-anchor="end" font-size="10" fill="#888780">Stage II CRC</text>
  <text x="300" y="179" dominant-baseline="central" font-size="11" font-weight="600" fill="#085041">0.21</text>

  <!-- ROW 3: SARC041  T=218  name_y=231  bar=(210,236,156,22)  sub_y=270  val_x=372  val_y=247 -->
