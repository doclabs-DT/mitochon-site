  <rect x="210" y="236" width="156" height="22" rx="3" fill="#1D9E75"/>
  <text x="200" y="270" text-anchor="end" font-size="10" fill="#888780">Liposarcoma</text>
  <text x="372" y="247" dominant-baseline="central" font-size="11" font-weight="600" fill="#085041">0.39</text>

  <!-- ROW 4: RASolute 302  T=286  name_y=299  bar=(210,304,160,22)  sub_y=338  val_x=376  val_y=315 -->
  <text x="200" y="299" text-anchor="end" font-size="12" font-weight="600" fill="#444441">RASolute 302</text>
  <rect x="210" y="304" width="160" height="22" rx="3" fill="#1D9E75"/>
  <text x="200" y="338" text-anchor="end" font-size="10" fill="#888780">Pancreatic</text>
  <text x="376" y="315" dominant-baseline="central" font-size="11" font-weight="600" fill="#085041">0.40</text>

  <!-- ROW 5: OptimUM-02  T=354  name_y=367  bar=(210,372,168,22)  sub_y=406  val_x=384  val_y=383 -->
  <text x="200" y="367" text-anchor="end" font-size="12" font-weight="600" fill="#444441">OptimUM-02</text>
  <rect x="210" y="372" width="168" height="22" rx="3" fill="#1D9E75"/>
  <text x="200" y="406" text-anchor="end" font-size="10" fill="#888780">Uveal melanoma</text>
  <text x="384" y="383" dominant-baseline="central" font-size="11" font-weight="600" fill="#085041">0.42</text>

  <!-- ROW 6: BREAKWATER  T=422  name_y=435  bar=(210,440,176,22)  sub_y=474  val_x=392  val_y=451 -->
  <text x="200" y="435" text-anchor="end" font-size="12" font-weight="600" fill="#444441">BREAKWATER</text>
  <rect x="210" y="440" width="176" height="22" rx="3" fill="#1D9E75"/>
  <text x="200" y="474" text-anchor="end" font-size="10" fill="#888780">BRAF V600E mCRC</text>
  <text x="392" y="451" dominant-baseline="central" font-size="11" font-weight="600" fill="#085041">0.44</text>

  <!-- ROW 7: LBA6007  T=490  name_y=503  bar=(210,508,226,22)  sub_y=542  val_x=442  val_y=519 -->
  <text x="200" y="503" text-anchor="end" font-size="12" font-weight="600" fill="#444441">LBA6007</text>
  <rect x="210" y="508" width="226" height="22" rx="3" fill="#0F6E56"/>
  <text x="200" y="542" text-anchor="end" font-size="10" fill="#888780">R/M HNSCC</text>
  <text x="442" y="519" dominant-baseline="central" font-size="11" font-weight="600" fill="#E1F5EE">0.57</text>

  <!-- Footer -->
  <text x="340" y="620" text-anchor="middle" font-size="10" fill="#B4B2A9">Source: ASCO 2026 late-breaking abstracts · Mito AI analysis</text>

