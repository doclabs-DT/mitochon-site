  <text x="262" y="208" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">CAR-T Cell Therapy</text>
  <rect x="270" y="192" width="100" height="21" fill="#2d6a4f"/>
  <text x="376" y="207" font-family="Courier New, monospace" font-size="10" fill="#2d6a4f" font-weight="bold"> 5</text>

  <!-- Radiopharmaceutical: 5 → 100 -->
  <text x="262" y="234" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">Radiopharmaceutical</text>
  <rect x="270" y="218" width="100" height="21" fill="#b5510c"/>
  <text x="376" y="233" font-family="Courier New, monospace" font-size="10" fill="#b5510c" font-weight="bold"> 5</text>

  <!-- Monoclonal Ab: 5 → 100 -->
  <text x="262" y="260" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">Monoclonal Antibody</text>
  <rect x="270" y="244" width="100" height="21" fill="#1b5fc8" opacity="0.45"/>
  <text x="376" y="259" font-family="Courier New, monospace" font-size="10" fill="#1b5fc8" font-weight="bold"> 5</text>

