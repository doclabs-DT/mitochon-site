<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 490" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <!-- Background -->
  <rect width="760" height="490" fill="#f5f2eb"/>

  <!-- Title block -->
  <rect x="0" y="0" width="760" height="60" fill="#0d0d0d"/>
  <text x="24" y="34" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#f5f2eb">FIH Assets by Modality Class — ASCO 2026</text>
  <text x="24" y="50" font-family="Courier New, monospace" font-size="9" fill="#aaa9a0" letter-spacing="1">TITLE-BASED ANALYSIS · MITO AI VERISIGHT · N≈100 ASSETS · PRELIMINARY</text>

  <!-- Grid lines -->
  <line x1="270" y1="80" x2="270" y2="400" stroke="#d4cec2" stroke-width="1"/>
  <line x1="330" y1="80" x2="330" y2="400" stroke="#d4cec2" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="390" y1="80" x2="390" y2="400" stroke="#d4cec2" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="450" y1="80" x2="450" y2="400" stroke="#d4cec2" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="510" y1="80" x2="510" y2="400" stroke="#d4cec2" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="570" y1="80" x2="570" y2="400" stroke="#d4cec2" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="630" y1="80" x2="630" y2="400" stroke="#d4cec2" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="690" y1="80" x2="690" y2="400" stroke="#d4cec2" stroke-width="0.6" stroke-dasharray="3,3"/>

  <!-- X axis labels: 0,3,6,9,12,15,18 — scale: 0→270, 3→330, 6→390 etc (20px per unit) -->
  <text x="270" y="415" font-family="Courier New, monospace" font-size="9" fill="#7a7267" text-anchor="middle">0</text>
  <text x="330" y="415" font-family="Courier New, monospace" font-size="9" fill="#7a7267" text-anchor="middle">3</text>
  <text x="390" y="415" font-family="Courier New, monospace" font-size="9" fill="#7a7267" text-anchor="middle">6</text>
  <text x="450" y="415" font-family="Courier New, monospace" font-size="9" fill="#7a7267" text-anchor="middle">9</text>
  <text x="510" y="415" font-family="Courier New, monospace" font-size="9" fill="#7a7267" text-anchor="middle">12</text>
  <text x="570" y="415" font-family="Courier New, monospace" font-size="9" fill="#7a7267" text-anchor="middle">15</text>
  <text x="630" y="415" font-family="Courier New, monospace" font-size="9" fill="#7a7267" text-anchor="middle">18</text>
  <text x="690" y="415" font-family="Courier New, monospace" font-size="9" fill="#7a7267" text-anchor="middle">21</text>
  <text x="460" y="435" font-family="Courier New, monospace" font-size="9" fill="#7a7267" text-anchor="middle" letter-spacing="1">NUMBER OF FIH ASSETS</text>

