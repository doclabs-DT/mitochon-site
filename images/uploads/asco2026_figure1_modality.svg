  <!-- ROW DEFINITIONS: y positions, label, width (20px per unit), color, value -->
  <!-- Row height 22px, gap 4px, start y=88 -->

  <!-- Small Molecule Inhibitor: 17 → width 340 -->
  <text x="262" y="104" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">Small Molecule Inhibitor</text>
  <rect x="270" y="88" width="340" height="21" fill="#c8351b"/>
  <text x="616" y="103" font-family="Courier New, monospace" font-size="10" fill="#c8351b" font-weight="bold"> 17</text>

  <!-- ADC: 13 → 260 -->
  <text x="262" y="130" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">Antibody-Drug Conjugate (ADC)</text>
  <rect x="270" y="114" width="260" height="21" fill="#c8351b" opacity="0.7"/>
  <text x="536" y="129" font-family="Courier New, monospace" font-size="10" fill="#c8351b" font-weight="bold"> 13</text>

  <!-- Bispecific: 8 → 160 -->
  <text x="262" y="156" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">Bispecific / Multispecific Ab</text>
  <rect x="270" y="140" width="160" height="21" fill="#1b5fc8"/>
  <text x="436" y="155" font-family="Courier New, monospace" font-size="10" fill="#1b5fc8" font-weight="bold"> 8</text>

  <!-- PROTAC: 6 → 120 -->
  <text x="262" y="182" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">PROTAC / Protein Degrader</text>
  <rect x="270" y="166" width="120" height="21" fill="#5c4a8a"/>
  <text x="396" y="181" font-family="Courier New, monospace" font-size="10" fill="#5c4a8a" font-weight="bold"> 6</text>

