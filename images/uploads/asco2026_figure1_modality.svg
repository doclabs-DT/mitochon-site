  <text x="356" y="285" font-family="Courier New, monospace" font-size="10" fill="#7a7267" font-weight="bold"> 4</text>

  <!-- Cytokine: 3 → 60 -->
  <text x="262" y="312" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">Cytokine</text>
  <rect x="270" y="296" width="60" height="21" fill="#0d7a5a"/>
  <text x="336" y="311" font-family="Courier New, monospace" font-size="10" fill="#0d7a5a" font-weight="bold"> 3</text>

  <!-- Other / Emerging: 3 → 60 -->
  <text x="262" y="338" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">Other / Emerging</text>
  <rect x="270" y="322" width="60" height="21" fill="#aaa9a0"/>
  <text x="336" y="337" font-family="Courier New, monospace" font-size="10" fill="#7a7267" font-weight="bold"> 3</text>

  <!-- mRNA: 1 → 20 -->
  <text x="262" y="364" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">mRNA Therapy</text>
  <rect x="270" y="348" width="20" height="21" fill="#e07b00"/>
  <text x="296" y="363" font-family="Courier New, monospace" font-size="10" fill="#e07b00" font-weight="bold"> 1</text>

  <!-- Oncolytic Virus: 1 → 20 -->
  <text x="262" y="390" font-family="Georgia, serif" font-size="11" fill="#0d0d0d" text-anchor="end">Oncolytic Virus</text>
  <rect x="270" y="374" width="20" height="21" fill="#c84d8a"/>
  <text x="296" y="389" font-family="Courier New, monospace" font-size="10" fill="#c84d8a" font-weight="bold"> 1</text>

  <!-- Caption -->
  <rect x="0" y="415" width="760" height="75" fill="#ede9e0"/>
  <line x1="0" y1="415" x2="760" y2="415" stroke="#d4cec2" stroke-width="1"/>
  <text x="24" y="432" font-family="Courier New, monospace" font-size="8.5" fill="#7a7267">Figure 1 · ADC and Small Molecule Inhibitor dominate numerically. PROTAC, CAR-T and Radiopharmaceutical</text>
  <text x="24" y="448" font-family="Courier New, monospace" font-size="8.5" fill="#7a7267">classes show significant breadth for early-stage programmes at ASCO 2026.</text>
  <text x="24" y="468" font-family="Courier New, monospace" font-size="8" fill="#aaa9a0">Source: ASCO 2026 abstract portal, titles only. Analysis by Mito AI VERISIGHT. Preliminary. © Mitochon Ltd.</text>
</svg>
