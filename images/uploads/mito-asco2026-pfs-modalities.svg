<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420" font-family="Arial, Helvetica, sans-serif">

  <rect width="680" height="420" fill="#ffffff"/>

  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#0D1B2A">PFS improvements - novel modality trials, ASCO 2026</text>
  <text x="340" y="46" text-anchor="middle" font-size="11" fill="#5F5E5A">Progression-free survival in months (treatment vs control)</text>

  <!-- Legend -->
  <rect x="170" y="58" width="12" height="12" fill="#1D9E75"/>
  <text x="188" y="69" font-size="11" fill="#5F5E5A">Treatment arm</text>
  <rect x="320" y="58" width="12" height="12" fill="#B4B2A9"/>
  <text x="338" y="69" font-size="11" fill="#5F5E5A">Control arm</text>

  <!-- Plot area: x=60..640, y=80..360. Height=280px -->
  <!-- y axis: 0 to 30 mo, scale = 280/30 = 9.33px per mo -->
  <!-- y_bar(v) = 360 - v*9.33 -->

  <!-- Grid lines at 0,5,10,15,20,25,30 -->
  <line x1="60" y1="360" x2="640" y2="360" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="60" y1="360" x2="60"  y2="80"  stroke="#D3D1C7" stroke-width="0.5"/>

  <line x1="60" y1="313" x2="640" y2="313" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="60" y1="267" x2="640" y2="267" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="60" y1="220" x2="640" y2="220" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="60" y1="173" x2="640" y2="173" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="60" y1="127" x2="640" y2="127" stroke="#F1EFE8" stroke-width="0.5"/>
  <line x1="60" y1="80"  x2="640" y2="80"  stroke="#F1EFE8" stroke-width="0.5"/>

  <!-- Y axis labels -->
  <text x="52" y="364" text-anchor="end" font-size="10" fill="#888780">0</text>
  <text x="52" y="317" text-anchor="end" font-size="10" fill="#888780">5</text>
  <text x="52" y="271" text-anchor="end" font-size="10" fill="#888780">10</text>
  <text x="52" y="224" text-anchor="end" font-size="10" fill="#888780">15</text>
  <text x="52" y="177" text-anchor="end" font-size="10" fill="#888780">20</text>
  <text x="52" y="131" text-anchor="end" font-size="10" fill="#888780">25</text>
  <text x="52" y="84"  text-anchor="end" font-size="10" fill="#888780">30</text>

  <text x="18" y="220" text-anchor="middle" font-size="11" fill="#888780" transform="rotate(-90,18,220)">Months</text>

  <!-- 4 trial groups, each with 2 bars (treatment + control) -->
  <!-- group width = (640-60)/4 = 145px, bar width = 44px, gap between bars = 12px, group padding ~22px each side -->
  <!-- group centres: 60 + 72.5 = 132.5, 277.5, 422.5, 567.5 -->
  <!-- bar1 x = centre - 28, bar2 x = centre + 16 - wait, bar+gap: bar1 x=centre-50, bar2 x=centre+6 -->

  <!-- Group 1: SUCCESSOR-2  treatment=18.0, control=8.3 -->
  <!-- y_tx = 360 - 18.0*9.33 = 360-168 = 192, height=168 -->
  <!-- y_ctrl = 360 - 8.3*9.33 = 360-77.4 = 282.6, height=77.4 -->
  <rect x="88" y="192" width="44" height="168" rx="3" fill="#1D9E75"/>
  <rect x="138" y="283" width="44" height="77" rx="3" fill="#B4B2A9"/>
  <text x="110" y="186" text-anchor="middle" font-size="10" font-weight="600" fill="#0F6E56">18.0</text>
  <text x="160" y="277" text-anchor="middle" font-size="10" fill="#888780">8.3</text>
  <text x="145" y="380" text-anchor="middle" font-size="11" fill="#444441">SUCCESSOR-2</text>
  <text x="145" y="394" text-anchor="middle" font-size="10" fill="#888780">MeziKd · RRMM</text>

  <!-- Group 2: Iza-bren  treatment=8.5, control=3.1 -->
  <!-- y_tx = 360 - 8.5*9.33 = 360-79.3 = 280.7, height=79.3 -->
  <!-- y_ctrl = 360 - 3.1*9.33 = 360-28.9 = 331.1, height=28.9 -->
  <rect x="233" y="281" width="44" height="79" rx="3" fill="#1D9E75"/>
  <rect x="283" y="331" width="44" height="29" rx="3" fill="#B4B2A9"/>
  <text x="255" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#0F6E56">8.5</text>
  <text x="305" y="325" text-anchor="middle" font-size="10" fill="#888780">3.1</text>
  <text x="290" y="380" text-anchor="middle" font-size="11" fill="#444441">Iza-bren</text>
  <text x="290" y="394" text-anchor="middle" font-size="10" fill="#888780">TNBC</text>

  <!-- Group 3: HARMONi-6 (OS)  treatment=27.9, control=23.7 -->
  <!-- y_tx = 360 - 27.9*9.33 = 360-260.3 = 99.7, height=260.3 -->
  <!-- y_ctrl = 360 - 23.7*9.33 = 360-221.1 = 138.9, height=221.1 -->
  <rect x="378" y="100" width="44" height="260" rx="3" fill="#1D9E75"/>
  <rect x="428" y="139" width="44" height="221" rx="3" fill="#B4B2A9"/>
  <text x="400" y="94" text-anchor="middle" font-size="10" font-weight="600" fill="#0F6E56">27.9</text>
  <text x="450" y="133" text-anchor="middle" font-size="10" fill="#888780">23.7</text>
  <text x="435" y="380" text-anchor="middle" font-size="11" fill="#444441">HARMONi-6</text>
  <text x="435" y="394" text-anchor="middle" font-size="10" fill="#888780">Ivonescimab · NSCLC*</text>

  <!-- Group 4: MIZAR-003  treatment=4.1, control=1.6 -->
  <!-- y_tx = 360 - 4.1*9.33 = 360-38.3 = 321.7, height=38.3 -->
  <!-- y_ctrl = 360 - 1.6*9.33 = 360-14.9 = 345.1, height=14.9 -->
  <rect x="523" y="322" width="44" height="38" rx="3" fill="#1D9E75"/>
  <rect x="573" y="345" width="44" height="15" rx="3" fill="#B4B2A9"/>
  <text x="545" y="316" text-anchor="middle" font-size="10" font-weight="600" fill="#0F6E56">4.1</text>
  <text x="595" y="339" text-anchor="middle" font-size="10" fill="#888780">1.6</text>
  <text x="580" y="380" text-anchor="middle" font-size="11" fill="#444441">MIZAR-003</text>
  <text x="580" y="394" text-anchor="middle" font-size="10" fill="#888780">TIL · Melanoma</text>

  <text x="340" y="412" text-anchor="middle" font-size="10" fill="#B4B2A9">*HARMONi-6 shows OS. All others PFS. Source: ASCO 2026 · Mito AI analysis</text>
</svg>
