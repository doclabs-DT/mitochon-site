<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" width="680" height="580" font-family="Arial, Helvetica, sans-serif">

  <rect width="680" height="580" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Header: ctDNA detected -->
  <rect x="190" y="20" width="300" height="52" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="40" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">ctDNA signal detected</text>
  <text x="340" y="58" text-anchor="middle" font-size="11" fill="#0F6E56">Circulating tumour DNA in blood</text>

  <!-- Arrow down -->
  <line x1="340" y1="72" x2="340" y2="100" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- Row 1: 5 role boxes at y=100, each 118px wide, 8px gap -->
  <!-- total = 5*118 + 4*8 = 590 + 32 = 622, left offset = (680-622)/2 = 29 -->
  <!-- centres: 29+59=88, 29+118+8+59=214, 29+236+16+59=340, 29+354+24+59=466, 29+472+32+59=592 -->

  <!-- Box 1: Detect residual disease -->
  <rect x="29" y="100" width="118" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="88" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Detect residual</text>
  <text x="88" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">disease</text>
  <text x="88" y="148" text-anchor="middle" font-size="10" fill="#0F6E56">CIRCULATE · CRC</text>

  <!-- Box 2: Escalate -->
  <rect x="155" y="100" width="118" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="214" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Escalate</text>
  <text x="214" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">treatment</text>
  <text x="214" y="148" text-anchor="middle" font-size="10" fill="#0F6E56">FLAME · NSCLC</text>

  <!-- Box 3: Switch -->
  <rect x="281" y="100" width="118" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Switch</text>
  <text x="340" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">treatment</text>
  <text x="340" y="148" text-anchor="middle" font-size="10" fill="#0F6E56">SERENA-6 · Breast</text>

  <!-- Box 4: Predict -->
  <rect x="407" y="100" width="118" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="466" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Predict</text>
  <text x="466" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">response</text>
  <text x="466" y="148" text-anchor="middle" font-size="10" fill="#0F6E56">SCIENCE · Esophageal</text>

  <!-- Box 5: Early detection -->
  <rect x="533" y="100" width="118" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="592" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Detect cancer</text>
  <text x="592" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">early</text>
  <text x="592" y="148" text-anchor="middle" font-size="10" fill="#0F6E56">NHS-Galleri · MCED</text>

  <!-- Arrows down to evidence boxes -->
  <line x1="88"  y1="152" x2="88"  y2="180" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow-gray)"/>
  <line x1="214" y1="152" x2="214" y2="180" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow-gray)"/>
  <line x1="340" y1="152" x2="340" y2="180" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow-gray)"/>
  <line x1="466" y1="152" x2="466" y2="180" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow-gray)"/>
  <line x1="592" y1="152" x2="592" y2="180" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow-gray)"/>

  <!-- Evidence boxes y=180, same x positions, height=100 -->
  <rect x="29"  y="180" width="118" height="100" rx="8" fill="#F7F6F2" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="88"  y="200" text-anchor="middle" font-size="10" fill="#444441">Adj. chemo cut</text>
  <text x="88"  y="216" text-anchor="middle" font-size="10" fill="#444441">3yr recurrence</text>
  <text x="88"  y="232" text-anchor="middle" font-size="10" fill="#444441">62% → 19% in</text>
  <text x="88"  y="248" text-anchor="middle" font-size="10" fill="#444441">ctDNA+ patients</text>
  <text x="88"  y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">HR 0.21</text>

  <rect x="155" y="180" width="118" height="100" rx="8" fill="#F7F6F2" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="214" y="200" text-anchor="middle" font-size="10" fill="#444441">Persistent ctDNA</text>
  <text x="214" y="216" text-anchor="middle" font-size="10" fill="#444441">at 3wk triggered</text>
  <text x="214" y="232" text-anchor="middle" font-size="10" fill="#444441">chemo-IO switch</text>
  <text x="214" y="248" text-anchor="middle" font-size="10" fill="#444441">PFS 23.1 vs 12.7 mo</text>
  <text x="214" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">HR 0.53</text>

  <rect x="281" y="180" width="118" height="100" rx="8" fill="#F7F6F2" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="200" text-anchor="middle" font-size="10" fill="#444441">ESR1 mutation in</text>
  <text x="340" y="216" text-anchor="middle" font-size="10" fill="#444441">ctDNA triggered</text>
  <text x="340" y="232" text-anchor="middle" font-size="10" fill="#444441">camizestrant</text>
  <text x="340" y="248" text-anchor="middle" font-size="10" fill="#444441">switch</text>
  <text x="340" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">PFS2 HR 0.63</text>

  <rect x="407" y="180" width="118" height="100" rx="8" fill="#F7F6F2" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="466" y="200" text-anchor="middle" font-size="10" fill="#444441">ctDNA clearance</text>
  <text x="466" y="216" text-anchor="middle" font-size="10" fill="#444441">predicted pCR</text>
  <text x="466" y="232" text-anchor="middle" font-size="10" fill="#444441">62.2% vs 9.1%</text>
  <text x="466" y="248" text-anchor="middle" font-size="10" fill="#444441">just 3 weeks</text>
  <text x="466" y="264" text-anchor="middle" font-size="10" fill="#444441">into treatment</text>
  <text x="466" y="274" text-anchor="middle" font-size="0" fill="none"/>

  <rect x="533" y="180" width="118" height="100" rx="8" fill="#F7F6F2" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="592" y="200" text-anchor="middle" font-size="10" fill="#444441">Increased Stage</text>
  <text x="592" y="216" text-anchor="middle" font-size="10" fill="#444441">I/II detection</text>
  <text x="592" y="232" text-anchor="middle" font-size="10" fill="#444441">Found cancers</text>
  <text x="592" y="248" text-anchor="middle" font-size="10" fill="#444441">with no existing</text>
  <text x="592" y="264" text-anchor="middle" font-size="10" fill="#444441">screening method</text>

  <!-- Converging arrows to summary -->
  <line x1="88"  y1="280" x2="88"  y2="316" stroke="#1D9E75" stroke-width="0.5"/>
  <line x1="214" y1="280" x2="214" y2="316" stroke="#1D9E75" stroke-width="0.5"/>
  <line x1="340" y1="280" x2="340" y2="316" stroke="#1D9E75" stroke-width="0.5"/>
  <line x1="466" y1="280" x2="466" y2="316" stroke="#1D9E75" stroke-width="0.5"/>
  <line x1="592" y1="280" x2="592" y2="316" stroke="#1D9E75" stroke-width="0.5"/>
  <line x1="88"  y1="316" x2="592" y2="316" stroke="#1D9E75" stroke-width="0.5"/>
  <line x1="340" y1="316" x2="340" y2="344" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- Summary box -->
  <rect x="130" y="344" width="420" height="52" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="364" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">ctDNA: from biomarker to clinical tool</text>
  <text x="340" y="382" text-anchor="middle" font-size="11" fill="#0F6E56">Guiding escalation, switches and detection across tumour types</text>

  <text x="340" y="416" text-anchor="middle" font-size="10" fill="#B4B2A9">Source: ASCO 2026 late-breaking abstracts · Mito AI analysis</text>
</svg>
